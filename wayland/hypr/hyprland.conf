# This is an example Hyprland config file.
#
# Refer to the wiki for more information.

#
# Please note not all available settings / options are set here.
# For a full list, see the wiki
#

env = GDK_BACKEND,wayland,x11,*
env = SDL_VIDEODRIVER,wayland
env = CLUTTER_BACKEND,wayland
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland
env = QT_AUTO_SCREEN_SCALE_FACTOR,1
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = QT_QPA_PLATFORMTHEME,qt5ct

# See https://wiki.hyprland.org/Configuring/Keywords/ for more


## AUTOSTART
#

exec-once = ~/workspace/aaku/wayland/bin/import-env.sh & ~/workspace/aaku/wayland/bin/set-gtk-theme.sh
exec-once = /usr/lib/polkit-kde-authentication-agent-1 & swaync & wl-paste --type text --watch cliphist store & wl-paste --type image --watch cliphist store
exec-once = waybar & ~/workspace/aaku/wayland/bin/launcher-drawer.sh & wpaperd -d
exec-once = dropbox & blueman-applet & fcitx5 -D
# exec-once = dropbox & nextcloud --background & blueman-applet & fcitx5 -D

# For lockscreen
# exec-once=swayidle -w timeout 200 'swaylock-fancy'

# Screen Sharing
# exec-once=dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
# exec-once=systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
# exec-once=~/.config/hypr/scripts/screensharing.sh

# Source a file (multi-file configs)
# source = ~/.config/hypr/myColors.conf


## VARIABLES

# Set programs that you use
$terminal       = ghostty
$browser        = firefox
$fileManager    = nautilus
$menu           = fuzzel
$menu-power     = ~/workspace/aaku/wayland/bin/power-menu.sh
$menu-calc      = ~/workspace/aaku/wayland/bin/calc.sh
$menu-clipboard = cliphist list | fuzzel --dmenu --placeholder="" --prompt="📋   " --lines=10 | cliphist decode | wl-copy
$lock_command   = ~/workspace/aaku/wayland/bin/screen-lock.sh

# For all categories, see https://wiki.hyprland.org/Configuring/Variables/


## DEVICES

# See https://wiki.hyprland.org/Configuring/Monitors/
monitor=eDP-1,highrr,auto,1 # prefer high refresh rate for all monitors
monitor=,preferred,auto,1.5 # for pluggin in random monitors
# monitor=DP-1,3840x2160@59.997hz,0x0,1.5

# Example per-device config
# See https://wiki.hyprland.org/Configuring/Keywords/#per-device-input-configs for more
device {
}

input {
    # grep -i 'persian' /usr/share/X11/xkb/rules/base.lst
    kb_layout  = us,ara
    kb_variant =
    kb_model   =
    kb_options = compose:ralt
    kb_rules   =
    #kb_options = grp:alt_shift_toggle

    follow_mouse = 1

    touchpad {
        natural_scroll = yes
        disable_while_typing=true
        scroll_factor=1
    }

    natural_scroll = yes
    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.
}

gestures {
  # workspace_swipe                    = true
  # workspace_swipe_fingers            = 3
  workspace_swipe_distance           = 400
  workspace_swipe_min_speed_to_force = 30
  workspace_swipe_create_new         = true
  workspace_swipe_cancel_ratio       = 0.5
  workspace_swipe_forever            = true
}

plugin {
}

## DECORATION
#

general {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more
    gaps_in               = 5
    gaps_out              = 10
    border_size           = 0
    col.active_border     = 0xff313244
    col.inactive_border   = rgba(595959aa)
    # no_border_on_floating = true

    layout = dwindle

    # apply_sens_to_raw = 0 # whether to apply the sensitivity to raw input (e.g. used by games where you aim using your mouse)
    # Please see https://wiki.hyprland.org/Configuring/Tearing/ before you turn this on
    allow_tearing = false
}

decoration {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more

    rounding           = 7
    active_opacity     = 1.00
    inactive_opacity   = 1.00
    fullscreen_opacity = 1.00

    # dim_inactive        = true
    # dim_strength        = 0.07

    shadow {
      enabled        = false
      range          = 5
      render_power   = 2
      color          = 0xff74c7ec
      color_inactive = 0xff313244
    }

    blur {
        enabled =  true
        # Your blur "amount" is blur_size * blur_passes, but high blur_size (over around 5-ish) will produce artifacts.
        # if you want heavy blur, you need to up the blur_passes.
        # the more passes, the more you can up the blur_size without noticing artifacts.
        size              = 4
        passes            = 3
        new_optimizations = true
        ignore_opacity    = true
        brightness        = 1.0
        xray              = false
        vibrancy          = 0.50
        vibrancy_darkness = 0.50
        contrast          = 1.0
        popups            = false
    }

    # blurls = gtk-layer-shell
    # blurls = nwg-drawer
    # blurls = swaync
}

animations {
  enabled = true

  # first_launch_animation = true

  # Some default animations, see https://wiki.hyprland.org/Configuring/Animations/ for more
  bezier = overshot, 0.05, 0.9, 0.1, 1.05
  bezier = smoothOut, 0.36, 0, 0.66, -0.56
  bezier = smoothIn, 0.25, 1, 0.5, 1

  animation = windows, 1, 3, overshot, slide
  animation = windowsOut, 1, 3, smoothOut, slide
  animation = windowsMove, 1, 3, default
  animation = border, 1, 3, default
  animation = fade, 1, 3, smoothIn
  animation = fadeDim, 1, 3, smoothIn
  animation = workspaces, 1, 3, default

  # # Exploding animations
  # bezier = wind, 0.5, 0.9, 0.5, 1.05
  # bezier = winIn, 0.5, 1.6, 0.7, 1
  # bezier = winOut, 0.5, 1.6, 0.6, 1
  # bezier = bounce, 0.7, 1.9, 0.5, 1
  # animation = windowsIn, 1, 3, winIn, popin
  # animation = windowsOut, 1, 3, winOut, popin
  # animation = windowsMove, 1, 3, wind, slide
  # animation = fade, 1, 3, wind
  # animation = workspaces, 1, 3, wind
  # animation = windows, 1, 3, bounce, popin
}

misc {
    disable_hyprland_logo        = true
    disable_splash_rendering     = true
    animate_mouse_windowdragging = false # this fixes the laggy window movement (source: https://github.com/hyprwm/Hyprland/issues/1753)
    animate_manual_resizes       = false # fixes slow resizes
}

xwayland {
  # fix blurry xwayland apps
  force_zero_scaling = true
}

dwindle {
    # See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
    pseudotile        = true # master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split    = true # you probably want this
    force_split       = 2
}

master {
    # See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
    # always_center_master = true
    orientation = center
    mfact = 0.5
    new_on_top = false
}


## KEY BINDINGS
#

# See https://wiki.hyprland.org/Configuring/Keywords/ for more
$mainMod = SUPER

# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
# l -> do stuff even when locked
# e -> repeats when key is held
#

bind = $mainMod, Q, killactive,
bind = $mainMod SHIFT, Q, exit,
bind = $mainMod, F, togglefloating,
bind = $mainMod, F, centerwindow
bind =         , F11, fullscreen,
bind = $mainMod, D,         pseudo,      # dwindle
bind = $mainMod, backslash, togglesplit, # dwindle
bind = $mainMod, S,         togglegroup, # dwindle
bind = $mainMod, h,         changegroupactive, b
bind = $mainMod, l,         changegroupactive, f

bind  = $mainMod, T, exec, $terminal
bind  = $mainMod, SPACE, exec, $menu
bind  = $mainMod, V, exec, $menu-clipboard
bindr = $mainMod, P, exec, $menu-power
bindr = $mainMod, equal, exec, $menu-calc
bind  = $mainMod, E, exec, $fileManager

# function controls
bindle = , XF86MonBrightnessUp  , exec, ~/workspace/aaku/wayland/bin/brightness.sh up
bindle = , XF86MonBrightnessDown, exec, ~/workspace/aaku/wayland/bin/brightness.sh down
bindle = , XF86AudioRaiseVolume , exec, ~/workspace/aaku/wayland/bin/volume.sh up
bindle = , XF86AudioLowerVolume , exec, ~/workspace/aaku/wayland/bin/volume.sh down
bindle = , XF86AudioMute        , exec, ~/workspace/aaku/wayland/bin/volume.sh mute
bindle = , XF86AudioMicMute     , exec, ~/workspace/aaku/wayland/bin/volume.sh mute-mic
bindle = , XF86AudioPlay        , exec, playerctl play-pause
bindle = , XF86AudioNext        , exec, playerctl next
bindle = , XF86AudioPrev        , exec, playerctl pre
bind = , Print, submap, screenshot
submap = screenshot
binde  = , f,      exec, ~/workspace/aaku/wayland/bin/screenshot.sh all
binde  = , f,      submap, reset
binde  = , w,      exec, ~/workspace/aaku/wayland/bin/screenshot.sh window
binde  = , w,      submap, reset
binde  = , s,      exec, ~/workspace/aaku/wayland/bin/screenshot.sh selection
binde  = , s,      submap, reset
binde  = , d,      exec, ~/workspace/aaku/wayland/bin/screenshot.sh all 5
binde  = , d,      submap, reset
bind   = , escape, submap, reset
bind   = , enter,  submap, reset
submap = reset

# # Notitifications
bind = $mainMod, N, exec, swaync-client -t -sw

# Move focus with mainMod + arrow keys
bind = $mainMod, left,  movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up,    movefocus, u
bind = $mainMod, down,  movefocus, d
bind = $mainMod, h, movefocus, l
bind = $mainMod, l, movefocus, r
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d

bind = ALT, Tab, cyclenext,
bind = ALT, Tab, bringactivetotop,
bind = Alt_L SHIFT, Tab, cyclenext, prev # change focus to previous window

# moving windows
bind=SUPERSHIFT,left,movewindow,l
bind=SUPERSHIFT,right,movewindow,r
bind=SUPERSHIFT,up,movewindow,u
bind=SUPERSHIFT,down,movewindow,d
# vim-keybinds
bind=SUPERSHIFT,h,movewindow,l
bind=SUPERSHIFT,l,movewindow,r
bind=SUPERSHIFT,k,movewindow,u
bind=SUPERSHIFT,j,movewindow,d

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

bind = $mainMod, R, submap, resize
submap = resize
binde  = , l,      resizeactive,  40 0
binde  = , h,      resizeactive, -40 0
binde  = , k,      resizeactive,   0 -40
binde  = , j,      resizeactive,   0 40
bind   = , escape, submap, reset
bind   = , enter,  submap, reset
submap = reset

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# special workspace (scratchpad) (mod + `)
bind = $mainMod, grave, togglespecialworkspace, magic
bind = $mainMod SHIFT, grave, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

bind = $mainMod, right, workspace, e+1
bind = $mainMod, left, workspace, e-1

binds {
  allow_workspace_cycles = true
}
bind = $mainMod, tab, workspace, previous

## WINDOW RULES
# See https://wiki.hypr.land/Configuring/Basics/Window-Rules/
# Block syntax (0.53+): windowrule { name = x  match:class = regex  float = true }

# Suppress maximize requests from all apps
windowrule {
  name = suppress-maximize
  match:class = .*
  suppress_event = maximize
}

# Opacity for productivity/media apps
windowrule {
  name = opacity-productivity-apps
  match:class = ^(Code|Slack|WebCord|Spotify)$
  opacity = 0.74 0.74
}

# Fuzzel launcher
windowrule {
  name = stayfocused-fuzzel
  match:class = fuzzel
  stay_focused = true
}
layerrule {
  name = noanim-fuzzel
  match:namespace = fuzzel
  no_anim = true
}

# nwg-drawer
windowrule {
  name = stayfocused-nwg-drawer
  match:class = nwg-drawer
  stay_focused = true
}
layerrule {
  name = noanim-nwg-drawer
  match:namespace = nwg-drawer
  no_anim = true
}

# wlogout
windowrule {
  name = fullscreen-wlogout
  match:class = wlogout
  fullscreen = true
}

# Nautilus file manager
windowrule {
  name = float-center-nautilus
  match:class = Nautilus
  float = true
  center = true
}

# Layer blur
layerrule {
  name = blur-logout-dialog
  match:namespace = logout_dialog
  blur = true
}
layerrule {
  name = blur-notifications
  match:namespace = notifications
  blur = true
}

# KDE auth / connect dialogs
windowrule {
  name = float-polkit
  match:class = org.kde.polkit-kde-authentication-agent-1
  float = true
}
windowrule {
  name = float-kdeconnect
  match:class = org.kde.kdeconnect.app
  float = true
}

# System utilities
windowrule {
  name = float-blueman
  match:class = blueman-manager
  float = true
}
windowrule {
  name = float-file-progress
  match:class = file_progress
  float = true
}
windowrule {
  name = float-appearance-tools
  match:class = ^(Lxappearance|nwg-look)$
  float = true
}
windowrule {
  name = float-viewnior
  match:class = ^(viewnior|Viewnior)$
  float = true
}
windowrule {
  name = float-audio-controls
  match:class = ^(pavucontrol-qt|pavucontrol)$
  float = true
}
windowrule {
  name = float-file-roller
  match:class = file-roller
  float = true
}
windowrule {
  name = float-generic-dialogs
  match:class = ^(confirm|dialog|download|notification|error|splash|confirmreset)$
  float = true
}

# Float by title
windowrule {
  name = float-by-title
  match:title = ^(Auto-Configuration Wizard|Confirm to replace files|Firewall Configuration|File Operation Progress|Open File|branchdialog|Media viewer|Picture-in-Picture|note)$
  float = true
}

# KeePassXC
windowrule {
  name = float-keepassxc
  match:title = KeePassXC
  float = true
  size = 1000 1000
  center = true
}

# G4Music
windowrule {
  name = float-g4music
  match:title = G4Music
  float = true
  size = 1000 1000
  center = true
}

# Preferences dialogs
windowrule {
  name = float-center-preferences
  match:title = Preferences
  float = true
  center = true
}

# Volume Control
windowrule {
  name = float-volume-control
  match:title = ^Volume Control$
  float = true
  size = 600 400
}

# Idle inhibit
windowrule {
  name = idle-inhibit-vlc
  match:class = vlc
  idle_inhibit = focus
}
windowrule {
  name = idle-inhibit-firefox
  match:class = firefox
  idle_inhibit = fullscreen
}
